<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Jobs | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- Sidebar + Global Layout CSS -->
    <link rel="stylesheet" href="../css/sidebar.css">

    <!-- Page Specific CSS -->
    <link rel="stylesheet" href="../css/admin-all-jobs.css">


</head>
<body>

<div class="admin-layout">


    <!-- GLOBAL SIDEBAR -->
    <div id="adminSidebar"></div>

    <main class="main-content">

        <!-- GLOBAL HEADER -->
        <div id="adminHeader"></div>

        <!-- ================= CONTENT ================= -->
        <div class="jobs-page-wrapper">

            <!-- CONTROL BAR -->
            <section class="jobs-control-bar">

                <div class="filter-group">
                    <label for="statusFilter">Filter by Status</label>

                    <select id="statusFilter">
                        <option value="">All Status</option>
                        <option value="ACTIVE">Active</option>
                        <option value="CLOSED">Closed</option>
                        <option value="REJECTED">Rejected</option>
                        <option value="PENDING_APPROVAL">Pending</option>
                        <option value="EXPIRED">Expired</option>
                        <option value="REMOVED_BY_ADMIN">Removed</option>
                    </select>

                    <button id="filterBtn" class="primary-btn">
                        Apply
                    </button>
                </div>

                <div class="job-count-wrapper">
                <span id="jobCount" class="job-count">
                    Total: 0
                </span>
                </div>

            </section>

            <!-- JOB CARDS -->
            <section class="jobs-table-card">
                <div id="allJobsTableBody" class="jobs-list">
                    <!-- Rendered by JS -->
                </div>
            </section>

        </div>

    </main>


</div>

<!-- ================= CONFIRMATION MODAL ================= -->

<div id="actionModal" class="modal hidden">
    <div class="modal-content">


        <h2 id="actionTitle">Confirm Action</h2>
        <p id="actionMessage"></p>

        <div class="modal-actions">
            <button class="secondary-btn" onclick="closeActionModal()">Cancel</button>
            <button id="confirmActionBtn" class="danger-btn"></button>
        </div>

    </div>


</div>

<script src="../js/config.js"></script>
<script src="../js/admin-global.js"></script>
<script src="../js/admin-all-jobs.js"></script>

</body>
</html>
