<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>All Users | EasyJobSpot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/admin-all-users.css">

</head>

<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <div id="adminSidebar"></div>


    <main class="main-content">

        <!-- HEADER -->
        <div id="adminHeader"></div>


        <!-- ================= STATS ================= -->

        <section class="stats-section">

            <div class="stat-card">
                <p>Total Users</p>
                <h2 id="totalUsers">0</h2>
            </div>

            <div class="stat-card">
                <p>Job Seekers</p>
                <h2 id="seekers">0</h2>
            </div>

            <div class="stat-card">
                <p>Providers</p>
                <h2 id="providers">0</h2>
            </div>

            <div class="stat-card">
                <p>Admins</p>
                <h2 id="admins">0</h2>
            </div>

        </section>


        <!-- ================= FILTER ================= -->

        <section class="filter-section">

            <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by name or email"
            >

            <select id="roleFilter">

                <option value="">All Users</option>

                <option value="JOB_SEEKER">
                    Job Seeker
                </option>

                <option value="JOB_PROVIDER">
                    Job Provider
                </option>

                <option value="SYSTEM_ADMIN">
                    System Admin
                </option>

            </select>

            <button
                    type="button"
                    class="primary-btn"
                    onclick="loadUsers()"
            >
                Filter
            </button>

        </section>


        <!-- ================= USERS TABLE ================= -->

        <section class="table-section">

            <div class="table-wrapper">

                <!-- DESKTOP TABLE -->

                <table class="users-table">

                    <thead>

                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>

                    </thead>

                    <tbody id="usersTable">

                    <tr>
                        <td colspan="5" class="empty-row">
                            No users found
                        </td>
                    </tr>

                    </tbody>

                </table>


                <!-- MOBILE CARDS -->

                <div id="usersCards" class="users-cards"></div>

            </div>

        </section>

    </main>

</div>


<!-- ================= DELETE MODAL ================= -->

<div id="deleteModal" class="delete-modal">

    <div class="delete-modal-box">

        <h3>Delete User</h3>

        <p>
            Are you sure you want to delete
            <strong id="deleteUserName"></strong> ?
        </p>

        <p class="modal-warning">
            This action cannot be undone.
        </p>

        <div class="delete-modal-actions">

            <button
                    type="button"
                    class="cancel-btn"
                    onclick="closeDeleteModal()"
            >
                Cancel
            </button>

            <button
                    type="button"
                    class="confirm-delete-btn"
                    onclick="confirmDeleteUser()"
            >
                Delete
            </button>

        </div>

    </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/admin-global.js"></script>
<script src="../js/admin-all-users.js"></script>

</body>
</html>
