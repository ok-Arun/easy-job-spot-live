<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provider Approvals | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- GLOBAL SIDEBAR CSS -->
    <link rel="stylesheet" href="../css/sidebar.css">

    <!-- PAGE CSS -->
    <link rel="stylesheet" href="../css/admin-provider-approval.css">
</head>

<body>

<div class="admin-layout">

    <!-- GLOBAL SIDEBAR -->
    <div id="adminSidebar"></div>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- GLOBAL HEADER -->
        <div id="adminHeader"></div>


        <!-- ================= SUMMARY ================= -->

        <section class="summary-section">

            <div class="summary-card">
                <h3>Total Pending Providers</h3>
                <p id="totalPending">--</p>
            </div>

        </section>


        <!-- ================= TABLE / CARDS ================= -->

        <section class="table-section">

            <div class="table-wrapper">

                <!-- DESKTOP TABLE -->

                <table class="providers-table">

                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody id="providersTableBody">

                    <tr>
                        <td colspan="4" class="empty-row">
                            No pending providers
                        </td>
                    </tr>

                    </tbody>

                </table>


                <!-- MOBILE CARDS -->

                <div id="providersCards" class="providers-cards"></div>

            </div>

        </section>

    </main>

</div>


<!-- ================= CONFIRM MODAL ================= -->

<div id="confirmModal" class="modal">

    <div class="modal-content">

        <h2 id="confirmTitle"></h2>
        <p id="confirmMessage"></p>

        <div class="modal-actions">
            <button class="secondary-btn" onclick="closeConfirmModal()">Cancel</button>
            <button id="confirmActionBtn"></button>
        </div>

    </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/admin-global.js"></script>
<script src="../js/admin-provider-approval.js"></script>

</body>
</html>
