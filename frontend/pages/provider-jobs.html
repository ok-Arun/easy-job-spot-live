<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Jobs | Job Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/provider-common.css">
    <link rel="stylesheet" href="../css/provider-jobs.css">
</head>
<body>

<!-- Navbar injected by provider-layout.js -->

<main class="container" role="main">

    <header class="page-header">
        <h1 class="page-title">My Posted Jobs</h1>
    </header>

    <!-- FILTERS -->
    <section class="job-filter-section" aria-label="Filter Jobs">
        <div class="job-filters" role="group" aria-label="Job Status Filters">

            <button
                    type="button"
                    class="filter-btn active"
                    aria-pressed="true"
                    data-status="">
                All
            </button>

            <button
                    type="button"
                    class="filter-btn"
                    aria-pressed="false"
                    data-status="ACTIVE">
                Active
            </button>

            <button
                    type="button"
                    class="filter-btn"
                    aria-pressed="false"
                    data-status="PENDING_APPROVAL">
                Pending
            </button>

            <button
                    type="button"
                    class="filter-btn"
                    aria-pressed="false"
                    data-status="CLOSED">
                Closed
            </button>

        </div>
    </section>

    <!-- STATE / LOADING / ERROR -->
    <section
            id="stateContainer"
            class="state loading"
            aria-live="polite"
            aria-busy="true">
        Loading jobs...
    </section>

    <!-- JOB LIST -->
    <section
            id="jobsContainer"
            class="job-list hidden"
            aria-live="polite">
    </section>

    <!-- PAGINATION -->
    <section
            id="paginationContainer"
            class="pagination hidden"
            aria-label="Pagination">
    </section>

</main>

<!-- CONFIRMATION MODAL -->
<div
        id="confirmModal"
        class="modal hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirmTitle"
        aria-describedby="confirmMessage">

    <div class="modal-box">

        <h2 id="confirmTitle">Confirm Action</h2>
        <p id="confirmMessage">Are you sure?</p>

        <div class="modal-actions">
            <button
                    type="button"
                    id="confirmCancel"
                    class="btn btn-secondary">
                Cancel
            </button>

            <button
                    type="button"
                    id="confirmOk"
                    class="btn btn-primary">
                Confirm
            </button>
        </div>

    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/auth-util.js"></script>
<script src="../js/provider-layout.js"></script>
<script src="../js/provider-jobs.js"></script>

</body>
</html>
